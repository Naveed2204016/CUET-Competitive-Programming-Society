<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Resources | CUET CPS</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <span class="logo-letter-bg">C</span>
      <span class="logo-text">CUET</span>
      <span class="logo-highlight">CP</span>
      <span class="logo-text">Society</span>
    </div>

    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="announcements.html">Announcements</a>
      <a href="#">Contests</a>
      <a href="editorials.html">Editorials</a>
      <a href="discussions.html">Discussions</a>
      <a href="leaderboard.html">Leaderboard</a>

      <a href="#" id="profileBtn">Profile</a>
    </div>
  </nav>

  <!-- Page Header -->
  <section class="page-header">
    <h1>📘 Learning Resources</h1>
    <p>
      Browse topic-wise videos, blogs, practice contests and editorial links
      curated for CUET CPS members.
    </p>
  </section>

  <!-- Syllabus Section -->
  <section class="syllabus-section">
    <h2>📄 CUET CP Syllabus</h2>
    <a href="https://drive.google.com/drive/folders/your-syllabus-link" target="_blank" class="primary-btn">Open
      Syllabus</a>
  </section>

  <!-- Admin Topic Creation -->
  <section class="create-topic" id="adminTopicSection" style="display: none">
    <h2>Add New Topic</h2>
    <input type="text" id="topicName" placeholder="Topic Name" />
    <button class="primary-btn" id="addTopicBtn">Add Topic</button>
  </section>

  <!-- Topics List -->
  <section class="topics-list" id="topicsList">
    <!-- Dynamically populated by JavaScript -->
  </section>

  <!-- Add Item Modal (admin only) -->
  <div class="modal-overlay" id="addItemModal">
    <div class="modal-box">
      <h3 id="modalTitle">Add Item</h3>
      <form id="addItemForm">
        <div class="modal-field" id="itemNameGroup">
          <label for="itemName">Name</label>
          <input type="text" id="itemName" placeholder="e.g. BFS Tutorial" />
        </div>
        <div class="modal-field" id="itemUrlGroup">
          <label for="itemUrl">URL</label>
          <input type="url" id="itemUrl" placeholder="https://..." />
        </div>
        <div class="modal-field" id="editorialGroup" style="display: none">
          <label for="editorialText">Editorial Text</label>
          <textarea id="editorialText" placeholder="Paste editorial content here..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="secondary-btn" id="modalCancelBtn">
            Cancel
          </button>
          <button type="submit" class="primary-btn">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Editorial View Modal -->
  <div class="modal-overlay" id="editorialModal">
    <div class="modal-box">
      <h3>Editorial</h3>
      <div class="editorial-view-content" id="editorialContent"></div>
      <div class="modal-actions">
        <button type="button" class="primary-btn" id="editorialCloseBtn">
          Close
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/resources.js"></script>
</body>

</html>
